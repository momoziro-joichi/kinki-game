<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>近畿陣取り（テスト版）</title>

<style>
body { background:#111; color:white; text-align:center; font-family:sans-serif; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>近畿陣取り（テスト）</h2>
<p id="status">県を選択</p>
<p id="score"></p>

<button onclick="attack()">攻撃</button>
<button onclick="defense()">守備</button>

<div id="map"></div>

<script>

let player = 1;
let cpu = 3;

function attack(){
  cpu--;
  update();
}

function defense(){
  player++;
  update();
}

function update(){
  document.getElementById("score").textContent =
    "プレイヤー:"+player+" CPU:"+cpu;
}

update();

</script>

</body>
</html>
